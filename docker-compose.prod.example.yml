services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: buddyduck-api:latest
    container_name: buddyduck-api
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_FORWARD_HEADERS_STRATEGY: framework
      TZ: Asia/Seoul
    expose:
      - "8080"
    networks:
      - buddyduck
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  caddy:
    image: caddy:2-alpine
    container_name: buddyduck-caddy
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - buddyduck

networks:
  buddyduck:
    driver: bridge

volumes:
  caddy-data:
  caddy-config:
